services:
  # Metadata Cluster Node 1
  metadata-node-1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadata-node-1
    hostname: metadata-node-1
    environment:
      - NODE_ID=1
      - LISTEN_PORT=7001
      - TOTAL_NODES=3
      - PEER_NODES=metadata-node-2:7002 metadata-node-3:7003
    ports:
      - "7001:7001"
    networks:
      - distributed-fs-net
    volumes:
      - metadata-wal-1:/tmp/metadata_wal
    restart: unless-stopped

  # Metadata Cluster Node 2
  metadata-node-2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadata-node-2
    hostname: metadata-node-2
    environment:
      - NODE_ID=2
      - LISTEN_PORT=7002
      - TOTAL_NODES=3
      - PEER_NODES=metadata-node-1:7001 metadata-node-3:7003
    ports:
      - "7002:7002"
    networks:
      - distributed-fs-net
    volumes:
      - metadata-wal-2:/tmp/metadata_wal
    restart: unless-stopped

  # Metadata Cluster Node 3
  metadata-node-3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadata-node-3
    hostname: metadata-node-3
    environment:
      - NODE_ID=3
      - LISTEN_PORT=7003
      - TOTAL_NODES=3
      - PEER_NODES=metadata-node-1:7001 metadata-node-2:7002
    ports:
      - "7003:7003"
    networks:
      - distributed-fs-net
    volumes:
      - metadata-wal-3:/tmp/metadata_wal
    restart: unless-stopped

  # Interactive Test Shell (for manual testing and debugging)
  test-shell:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    container_name: test-shell
    hostname: test-shell
    stdin_open: true
    tty: true
    networks:
      - distributed-fs-net
    volumes:
      - ./src:/app/src:ro
      - ./include:/app/include:ro
      - ./tests:/app/tests:ro
      - test-workspace:/app/workspace
    profiles:
      - test

  # Storage Node 1
    storage-node-1:
      build:
        context: ../
        dockerfile: Dockerfile.storage
      container_name: storage-node-1
      hostname: storage-node-1
      privileged: true
      devices:
        - /dev/fuse
      cap_add:
        - SYS_ADMIN
      environment:
        - NODE_ID=1
        - STORAGE_PORT=9000
        - GRPC_PORT=50051
      ports:
        - "9001:9000"  # Expose TCP adapter to host
      networks:
        - distributed-fs-net
      volumes:
        - storage-data-1:/data
      restart: unless-stopped

  # Storage Node 2
  storage-node-2:
    build:
      context: ../
      dockerfile: Dockerfile.storage
    container_name: storage-node-2
    hostname: storage-node-2
    privileged: true
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    environment:
      - NODE_ID=2
      - STORAGE_PORT=9000
      - GRPC_PORT=50051
    ports:
      - "9002:9000"
    networks:
      - distributed-fs-net
    volumes:
      - storage-data-2:/data
    restart: unless-stopped

  # Storage Node 3
  storage-node-3:
    build:
      context: ../
      dockerfile: Dockerfile.storage
    container_name: storage-node-3
    hostname: storage-node-3
    privileged: true
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    environment:
      - NODE_ID=3
      - STORAGE_PORT=9000
      - GRPC_PORT=50051
    ports:
      - "9003:9000"
    networks:
      - distributed-fs-net
    volumes:
      - storage-data-3:/data
    restart: unless-stopped

networks:
  distributed-fs-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  metadata-wal-1:
  metadata-wal-2:
  metadata-wal-3:
  storage-data-1:
  storage-data-2:
  storage-data-3:
  test-workspace:
