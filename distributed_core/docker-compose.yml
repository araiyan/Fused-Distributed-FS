services:
  # Metadata Cluster Node 1
  metadata-node-1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadata-node-1
    hostname: metadata-node-1
    environment:
      - NODE_ID=1
      - LISTEN_PORT=7001
      - TOTAL_NODES=3
      - PEER_NODES=metadata-node-2:7002 metadata-node-3:7003
    ports:
      - "7001:7001"
    networks:
      - distributed-fs-net
    volumes:
      - metadata-wal-1:/tmp/metadata_wal
    restart: unless-stopped

  # Metadata Cluster Node 2
  metadata-node-2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadata-node-2
    hostname: metadata-node-2
    environment:
      - NODE_ID=2
      - LISTEN_PORT=7002
      - TOTAL_NODES=3
      - PEER_NODES=metadata-node-1:7001 metadata-node-3:7003
    ports:
      - "7002:7002"
    networks:
      - distributed-fs-net
    volumes:
      - metadata-wal-2:/tmp/metadata_wal
    restart: unless-stopped

  # Metadata Cluster Node 3
  metadata-node-3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadata-node-3
    hostname: metadata-node-3
    environment:
      - NODE_ID=3
      - LISTEN_PORT=7003
      - TOTAL_NODES=3
      - PEER_NODES=metadata-node-1:7001 metadata-node-2:7002
    ports:
      - "7003:7003"
    networks:
      - distributed-fs-net
    volumes:
      - metadata-wal-3:/tmp/metadata_wal
    restart: unless-stopped
